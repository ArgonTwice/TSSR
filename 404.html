<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>TSSR — Base de connaissances</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">TSSR</span>
        <span class="logo-bracket">]</span>
      </div>
      <p class="logo-sub">Base de connaissances</p>
    </div>
    <nav id="module-nav">
      <p class="nav-section-label">Modules</p>
    </nav>
  </aside>
  <div id="mobile-header">
    <button id="menu-toggle" aria-label="Ouvrir le menu">
      <span></span><span></span><span></span>
    </button>
    <span class="mobile-title">TSSR</span>
    <span class="mobile-module-name" id="mobile-module-name"></span>
  </div>
  <main id="content">
    <div id="home-screen" class="screen active">
      <div class="home-hero">
        <div class="home-title-wrap">
          <h1 class="home-title">Base de<br>connaissances</h1>
          <p class="home-sub">TSSR · Technicien Supérieur Systèmes et Réseaux</p>
        </div>
        <div class="home-stats" id="home-stats"></div>
      </div>
      <div class="module-grid" id="module-grid"></div>
    </div>
    <div id="module-screen" class="screen">
      <div class="module-header">
        <button class="back-btn" id="back-btn" aria-label="Retour à l'accueil">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 3L5 9L11 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Retour
        </button>
        <div class="module-meta" id="module-meta"></div>
      </div>
      <div class="tab-bar" id="tab-bar" role="tablist"></div>
      <div id="tab-content" role="tabpanel"></div>
    </div>

    <div id="terminal-fs-screen" class="screen">
      <div id="terminal-fs-header" class="terminal-fs-header"></div>
      <div id="terminal-fs-content"></div>
    </div>
  </main>
</div>
<div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
<script src="data.js"></script>
<script src="vim.js"></script>
<script src="scenarios.js"></script>
<script src="app.js"></script>
</body>
</html>
